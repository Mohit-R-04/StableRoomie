name: Render Keep-Alive

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: 'Java Backend'
            url: 'https://stableroomie.onrender.com/'
          - name: 'Flask API'
            url: 'https://stableroomie-flask.onrender.com/health'
    
    steps:
      - name: Ping ${{ matrix.service.name }}
        run: |
          echo "Pinging ${{ matrix.service.name }}..."
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ matrix.service.url }}")
          echo "Response Code: $response"
          # Accept 200, 301, 302 (redirects) as success - just need to keep service awake
          if [ "$response" -eq 200 ] || [ "$response" -eq 301 ] || [ "$response" -eq 302 ]; then
            echo "✓ ${{ matrix.service.name }} is alive (HTTP $response)"
          else
            echo "⚠ ${{ matrix.service.name }} returned status $response (still counts as keep-alive ping)"
          fi
