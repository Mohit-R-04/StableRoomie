services:
  # 1. Java Spring Boot Backend
  - type: web
    name: stableroomie-backend
    env: docker
    dockerfilePath: StableRoomie/Dockerfile
    dockerContext: StableRoomie
    plan: free
    envVars:
      - key: DB_URL
        value: jdbc:postgresql://${{db.host}}:${{db.port}}/${{db.database}}
      - key: DB_USERNAME
        value: ${{db.user}}
      - key: DB_PASSWORD
        value: ${{db.password}}
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FLASK_API_URL
        value: http://${{stableroomie-flask.host}}

  # 2. Flask Microservice
  - type: web
    name: stableroomie-flask
    env: docker
    dockerfilePath: flask-api/Dockerfile
    dockerContext: flask-api
    plan: free
    envVars:
      - key: JAVA_BACKEND_URL
        value: http://${{stableroomie-backend.host}}

databases:
  - name: db
    databaseName: stableromie
